# Generated by AppFactoryKit appgen. Run: xcodegen generate
name: VoiceMemoTranscriber
options:
  bundleIdPrefix: com.zubeid
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AppFactoryKit:
    url: https://github.com/ZubeidHendricks/AppFactoryKit
    from: "0.1.0"

targets:
  VoiceMemoTranscriber:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
    dependencies:
      - package: AppFactoryKit
        product: AppFactoryKit
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "Transcriber"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSMicrophoneUsageDescription: "VoiceMemoTranscriber uses the microphone to record and process audio."
        NSSpeechRecognitionUsageDescription: "VoiceMemoTranscriber transcribes your recordings into text on-device."
    settings:
      base:
        PRODUCT_NAME: VoiceMemoTranscriber
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.transcribevoice
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  VoiceMemoTranscriberTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
      - path: Sources/TranscribeService.swift
    settings:
      base:
        PRODUCT_NAME: VoiceMemoTranscriberTests
        PRODUCT_BUNDLE_IDENTIFIER: com.zubeid.voicememotranscriber.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"

schemes:
  Tests:
    build:
      targets:
        VoiceMemoTranscriberTests: [test]
    test:
      targets:
        - VoiceMemoTranscriberTests
